name: Library API CI

on:
  push:
  pull_request:

jobs:
  build-test-package-docker-sonar:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: libraryapi

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Package application
        run: ./mvnw clean package -DskipTests

      - name: SonarQube Cloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=SurendeKumar_ma-adlms-api-01

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-api-jar
          path: libraryapi/target/*.jar

      - name: Build Docker image
        run: docker build -t libraryapi .

      - name: Run container
        run: docker run -d --name libraryapi-container -p 8080:8080 libraryapi

      - name: Wait for application startup
        run: sleep 20

      - name: Verify application is running
        run: curl --fail http://localhost:8080/documents

      - name: Show container logs if failure
        if: failure()
        run: docker logs libraryapi-container

      - name: Stop container
        if: always()
        run: docker stop libraryapi-container || true

      - name: Remove container
        if: always()
        run: docker rm libraryapi-container || true