spring.application.name=libraryapi
spring.datasource.url=jdbc:h2:mem:adlmsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

## only for User Activity class and Eureka dashboard
user.activity.client.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

####### Enable this for user activity service micro-service ######
#user.activity.service.base-url=http://localhost:8081
#user.activity.service.base-url=http://USER-ACTIVITY-SERVICE


###### Enable the below for Eureka Dashboard #######
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#eureka.instance.prefer-ip-address=true



####### Enable this for when Micro-service Architect #######
#spring.application.name=library-api-service
#spring.config.import=optional:configserver:http://localhost:8888